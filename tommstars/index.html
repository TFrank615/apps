<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TSCG MAP">

    <link rel="apple-touch-icon" href="tsicon.png">
    
    <title>TOMM STARS MAP</title>

    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        /* Prevent elastic bouncing on iOS */
        body {
            overscroll-behavior-y: none;
            -webkit-overflow-scrolling: touch;
        }
    </style>
</head>
<body class="bg-black h-screen w-screen m-0 flex items-center justify-center overflow-hidden">

    <img src="TS_Map-1.png" alt="TSCGMAP" class="max-w-full max-h-full object-contain">

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registered successfully');
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
    </script>
</body>
</html>
